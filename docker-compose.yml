---

services:
  app:
    build:
      context: .
    volumes:
      - ./:/app
      - ./data:/opt/flarehotspot/data
      - ./openwrt-files/etc/config:/etc/config
      - ./openwrt-files/etc/openwrt_release:/etc/openwrt_release
      - ./openwrt-files/etc/os_release.json:/etc/os_release.json
      - gocache:/var/cache/go
    environment:
      - GOCACHE=/var/cache/go/cache
      - GOMODCACHE=/var/cache/go/mod
    ports:
      - 3000:3000
      - 3333:3333
      - 8000:8000
    networks:
      flare_network:

  docs:
    build:
      context: ./sdk/mkdocs
    volumes:
      - ./sdk/mkdocs:/docs
    ports:
      - 3002:8000

volumes:
  gocache:

networks:
  flare_network:
    external: true
