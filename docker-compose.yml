---

services:
  app:
    build:
      context: .
    volumes:
      - ./:/app
      - ./data/config:/opt/flarehotspot/data/config
      - ./data/db:/opt/flarehotspot/data/db
      - ./data/plugins:/opt/flarehotspot/data/plugins
      - flare_storage:/opt/flarehotspot/data/storage
      - ./data/openwrt-files/etc/config:/etc/config
      - ./data/openwrt-files/etc/openwrt_release:/etc/openwrt_release
      - ./data/openwrt-files/etc/os_release.json:/etc/os_release.json
      - gocache:/var/cache/go
    environment:
      - GOCACHE=/var/cache/go/cache
      - GOMODCACHE=/var/cache/go/mod
    ports:
      - 3000:3000
      - 3333:3333
      - 8000:8000
    networks:
      flare_network:

  docs:
    build:
      context: ./sdk/mkdocs
    volumes:
      - ./sdk/mkdocs:/docs
    ports:
      - 3002:8000

  sqliteweb:
    image: coleifer/sqlite-web
    platform: linux/amd64
    volumes:
      - ./data/db:/data
    ports:
      - 3001:8080
    command: sqlite_web -H 0.0.0.0 -x /data/database.sqlite

volumes:
  gocache:
  flare_storage:

networks:
  flare_network:
    external: true
